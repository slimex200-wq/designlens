<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="navGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <filter id="btnShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6366F1" flood-opacity="0.25"/>
    </filter>
    <filter id="cardDrop">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#F8FAFC"/>

  <!-- Top Navigation Bar -->
  <rect x="0" y="0" width="800" height="56" fill="url(#navGrad)"/>
  <line x1="0" y1="56" x2="800" y2="56" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Logo -->
  <circle cx="36" cy="28" r="14" fill="#6366F1"/>
  <text x="36" y="33" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">T</text>
  <text x="60" y="33" font-family="Arial" font-size="15" font-weight="700" fill="#0F172A">TaskFlow</text>

  <!-- Nav links -->
  <text x="300" y="33" font-family="Arial" font-size="13" fill="#475569">Dashboard</text>
  <text x="390" y="33" font-family="Arial" font-size="13" fill="#6366F1" font-weight="600">Projects</text>
  <rect x="385" y="52" width="50" height="3" rx="1.5" fill="#6366F1"/>
  <text x="465" y="33" font-family="Arial" font-size="13" fill="#475569">Team</text>
  <text x="525" y="33" font-family="Arial" font-size="13" fill="#475569">Reports</text>

  <!-- Nav right -->
  <circle cx="700" cy="28" r="14" fill="#F1F5F9"/>
  <text x="700" y="32" font-family="Arial" font-size="10" text-anchor="middle">🔔</text>
  <circle cx="712" cy="20" r="5" fill="#EF4444"/>
  <text x="712" y="23" font-family="Arial" font-size="7" fill="white" text-anchor="middle" font-weight="bold">2</text>

  <circle cx="745" cy="28" r="16" fill="#E0E7FF"/>
  <text x="745" y="33" font-family="Arial" font-size="10" fill="#4338CA" text-anchor="middle" font-weight="600">JK</text>

  <!-- Page Header -->
  <text x="40" y="100" font-family="Arial" font-size="22" font-weight="700" fill="#0F172A">Design System Project</text>
  <text x="40" y="120" font-family="Arial" font-size="13" fill="#64748B">12 tasks · 4 in progress · 2 overdue</text>

  <!-- Action buttons -->
  <rect x="580" y="82" width="92" height="36" rx="8" fill="#6366F1" filter="url(#btnShadow)"/>
  <text x="626" y="105" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="500">+ Add Task</text>

  <rect x="684" y="82" width="80" height="36" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="724" y="105" font-family="Arial" font-size="12" fill="#475569" text-anchor="middle" font-weight="500">Filter</text>

  <!-- Kanban Board -->
  <!-- Column 1: To Do -->
  <rect x="30" y="144" width="240" height="440" rx="10" fill="#F1F5F9"/>
  <text x="50" y="172" font-family="Arial" font-size="13" font-weight="600" fill="#334155">To Do</text>
  <rect x="200" y="158" width="24" height="20" rx="10" fill="#E2E8F0"/>
  <text x="212" y="172" font-family="Arial" font-size="10" fill="#64748B" text-anchor="middle">5</text>

  <!-- Card 1 -->
  <rect x="42" y="190" width="216" height="90" rx="8" fill="#FFFFFF" filter="url(#cardDrop)"/>
  <rect x="42" y="190" width="216" height="4" rx="2" fill="#EF4444"/>
  <text x="56" y="216" font-family="Arial" font-size="12" font-weight="500" fill="#0F172A">Update color tokens</text>
  <text x="56" y="234" font-family="Arial" font-size="11" fill="#64748B">Align brand colors with new</text>
  <text x="56" y="248" font-family="Arial" font-size="11" fill="#64748B">guidelines from marketing</text>
  <rect x="56" y="258" width="48" height="18" rx="9" fill="#FEF2F2"/>
  <text x="80" y="271" font-family="Arial" font-size="9" fill="#EF4444" text-anchor="middle" font-weight="500">Urgent</text>
  <circle cx="240" cy="267" r="10" fill="#FECACA"/>
  <text x="240" y="271" font-family="Arial" font-size="8" fill="#DC2626" text-anchor="middle">SL</text>

  <!-- Card 2 -->
  <rect x="42" y="296" width="216" height="80" rx="8" fill="#FFFFFF" filter="url(#cardDrop)"/>
  <text x="56" y="322" font-family="Arial" font-size="12" font-weight="500" fill="#0F172A">Create icon library</text>
  <text x="56" y="340" font-family="Arial" font-size="11" fill="#64748B">Export and organize SVG</text>
  <text x="56" y="354" font-family="Arial" font-size="11" fill="#64748B">icons from Figma</text>
  <rect x="56" y="360" width="52" height="18" rx="9" fill="#EFF6FF"/>
  <text x="82" y="373" font-family="Arial" font-size="9" fill="#3B82F6" text-anchor="middle" font-weight="500">Design</text>

  <!-- Card 3 -->
  <rect x="42" y="392" width="216" height="68" rx="8" fill="#FFFFFF" filter="url(#cardDrop)"/>
  <text x="56" y="418" font-family="Arial" font-size="12" font-weight="500" fill="#0F172A">Typography scale review</text>
  <text x="56" y="436" font-family="Arial" font-size="11" fill="#64748B">Ensure consistency in font</text>
  <text x="56" y="450" font-family="Arial" font-size="11" fill="#64748B">sizes across components</text>

  <!-- Column 2: In Progress -->
  <rect x="280" y="144" width="240" height="440" rx="10" fill="#F1F5F9"/>
  <text x="300" y="172" font-family="Arial" font-size="13" font-weight="600" fill="#334155">In Progress</text>
  <rect x="450" y="158" width="24" height="20" rx="10" fill="#DBEAFE"/>
  <text x="462" y="172" font-family="Arial" font-size="10" fill="#3B82F6" text-anchor="middle">4</text>

  <!-- Card 4 -->
  <rect x="292" y="190" width="216" height="100" rx="8" fill="#FFFFFF" filter="url(#cardDrop)"/>
  <rect x="292" y="190" width="216" height="4" rx="2" fill="#F59E0B"/>
  <text x="306" y="216" font-family="Arial" font-size="12" font-weight="500" fill="#0F172A">Build button component</text>
  <text x="306" y="234" font-family="Arial" font-size="11" fill="#64748B">Primary, secondary, ghost, and</text>
  <text x="306" y="248" font-family="Arial" font-size="11" fill="#64748B">destructive variants</text>
  <!-- Progress bar -->
  <rect x="306" y="260" width="130" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="306" y="260" width="85" height="4" rx="2" fill="#F59E0B"/>
  <text x="445" y="267" font-family="Arial" font-size="9" fill="#94A3B8">65%</text>
  <circle cx="490" cy="267" r="10" fill="#DDD6FE"/>
  <text x="490" y="271" font-family="Arial" font-size="8" fill="#7C3AED" text-anchor="middle">MK</text>

  <!-- Card 5 -->
  <rect x="292" y="306" width="216" height="90" rx="8" fill="#FFFFFF" filter="url(#cardDrop)"/>
  <text x="306" y="332" font-family="Arial" font-size="12" font-weight="500" fill="#0F172A">Input field patterns</text>
  <text x="306" y="350" font-family="Arial" font-size="11" fill="#64748B">Text, select, date picker,</text>
  <text x="306" y="364" font-family="Arial" font-size="11" fill="#64748B">and validation states</text>
  <rect x="306" y="374" width="130" height="4" rx="2" fill="#E2E8F0"/>
  <rect x="306" y="374" width="52" height="4" rx="2" fill="#6366F1"/>
  <text x="445" y="381" font-family="Arial" font-size="9" fill="#94A3B8">40%</text>

  <!-- Card 6 -->
  <rect x="292" y="412" width="216" height="68" rx="8" fill="#FFFFFF" filter="url(#cardDrop)"/>
  <text x="306" y="438" font-family="Arial" font-size="12" font-weight="500" fill="#0F172A">Spacing system docs</text>
  <text x="306" y="456" font-family="Arial" font-size="11" fill="#64748B">Document 4px grid and</text>
  <text x="306" y="470" font-family="Arial" font-size="11" fill="#64748B">spacing scale decisions</text>

  <!-- Column 3: Done -->
  <rect x="530" y="144" width="240" height="440" rx="10" fill="#F1F5F9"/>
  <text x="550" y="172" font-family="Arial" font-size="13" font-weight="600" fill="#334155">Done</text>
  <rect x="700" y="158" width="24" height="20" rx="10" fill="#DCFCE7"/>
  <text x="712" y="172" font-family="Arial" font-size="10" fill="#16A34A" text-anchor="middle">3</text>

  <!-- Card 7 -->
  <rect x="542" y="190" width="216" height="80" rx="8" fill="#FFFFFF" filter="url(#cardDrop)" opacity="0.7"/>
  <text x="556" y="216" font-family="Arial" font-size="12" font-weight="500" fill="#64748B" text-decoration="line-through">Setup Figma library</text>
  <text x="556" y="234" font-family="Arial" font-size="11" fill="#94A3B8">Created master component</text>
  <text x="556" y="248" font-family="Arial" font-size="11" fill="#94A3B8">structure in Figma</text>
  <circle cx="736" cy="256" r="8" fill="#DCFCE7"/>
  <text x="736" y="260" font-family="Arial" font-size="10" fill="#16A34A" text-anchor="middle">✓</text>

  <!-- Card 8 -->
  <rect x="542" y="286" width="216" height="80" rx="8" fill="#FFFFFF" filter="url(#cardDrop)" opacity="0.7"/>
  <text x="556" y="312" font-family="Arial" font-size="12" font-weight="500" fill="#64748B" text-decoration="line-through">Brand audit complete</text>
  <text x="556" y="330" font-family="Arial" font-size="11" fill="#94A3B8">Reviewed all existing brand</text>
  <text x="556" y="344" font-family="Arial" font-size="11" fill="#94A3B8">assets and documented gaps</text>
  <circle cx="736" cy="352" r="8" fill="#DCFCE7"/>
  <text x="736" y="356" font-family="Arial" font-size="10" fill="#16A34A" text-anchor="middle">✓</text>

  <!-- Card 9 -->
  <rect x="542" y="382" width="216" height="68" rx="8" fill="#FFFFFF" filter="url(#cardDrop)" opacity="0.7"/>
  <text x="556" y="408" font-family="Arial" font-size="12" font-weight="500" fill="#64748B" text-decoration="line-through">Stakeholder interviews</text>
  <text x="556" y="426" font-family="Arial" font-size="11" fill="#94A3B8">Gathered requirements from</text>
  <text x="556" y="440" font-family="Arial" font-size="11" fill="#94A3B8">product and engineering</text>
  <circle cx="736" cy="440" r="8" fill="#DCFCE7"/>
  <text x="736" y="444" font-family="Arial" font-size="10" fill="#16A34A" text-anchor="middle">✓</text>
</svg>