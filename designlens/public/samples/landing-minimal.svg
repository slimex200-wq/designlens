<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="heroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <linearGradient id="glowOrb1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0E7FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E0E7FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowOrb2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE7F3" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FCE7F3" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FAFAFA"/>

  <!-- Subtle gradient orbs -->
  <circle cx="200" cy="200" r="200" fill="url(#glowOrb1)"/>
  <circle cx="650" cy="350" r="180" fill="url(#glowOrb2)"/>

  <!-- Navigation -->
  <rect x="0" y="0" width="800" height="60" fill="#FAFAFA" opacity="0.95"/>
  <line x1="0" y1="60" x2="800" y2="60" stroke="#E5E5E5" stroke-width="0.5"/>

  <!-- Nav logo -->
  <rect x="48" y="18" width="24" height="24" rx="6" fill="#111111"/>
  <text x="60" y="35" font-family="Georgia, serif" font-size="13" fill="white" text-anchor="middle" font-weight="700">S</text>
  <text x="82" y="35" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#111111">Serif</text>

  <!-- Nav links -->
  <text x="440" y="36" font-family="Arial" font-size="13" fill="#737373" font-weight="400">Features</text>
  <text x="520" y="36" font-family="Arial" font-size="13" fill="#737373" font-weight="400">Pricing</text>
  <text x="590" y="36" font-family="Arial" font-size="13" fill="#737373" font-weight="400">About</text>

  <!-- Nav CTA -->
  <rect x="660" y="16" width="92" height="32" rx="16" fill="url(#btnGrad)"/>
  <text x="706" y="37" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="500">Get Started</text>

  <!-- Hero Section -->
  <!-- Badge -->
  <rect x="304" y="100" width="192" height="28" rx="14" fill="#F5F3FF" stroke="#E9E5FF" stroke-width="0.5"/>
  <circle cx="322" cy="114" r="5" fill="#8B5CF6"/>
  <text x="336" y="118" font-family="Arial" font-size="11" fill="#7C3AED" font-weight="500">New: AI-powered writing</text>

  <!-- Hero heading -->
  <text x="400" y="172" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#111111" text-anchor="middle" letter-spacing="-2">Write better content,</text>
  <text x="400" y="222" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#111111" text-anchor="middle" letter-spacing="-2">effortlessly.</text>

  <!-- Hero subtitle -->
  <text x="400" y="258" font-family="Arial" font-size="16" fill="#737373" text-anchor="middle">The modern writing tool that helps you create, edit, and publish</text>
  <text x="400" y="278" font-family="Arial" font-size="16" fill="#737373" text-anchor="middle">beautiful content in minutes, not hours.</text>

  <!-- CTA buttons -->
  <rect x="280" y="304" width="130" height="44" rx="22" fill="url(#btnGrad)"/>
  <text x="345" y="331" font-family="Arial" font-size="14" fill="white" text-anchor="middle" font-weight="500">Start Free Trial</text>

  <rect x="424" y="304" width="100" height="44" rx="22" fill="none" stroke="#D4D4D4" stroke-width="1"/>
  <text x="474" y="331" font-family="Arial" font-size="14" fill="#525252" text-anchor="middle" font-weight="500">Watch Demo</text>
  <!-- Play icon -->
  <polygon points="454,326 454,332 460,329" fill="#525252"/>

  <!-- Social proof -->
  <!-- Avatar stack -->
  <circle cx="320" cy="378" r="14" fill="#E5E5E5" stroke="#FAFAFA" stroke-width="2"/>
  <circle cx="340" cy="378" r="14" fill="#FED7AA" stroke="#FAFAFA" stroke-width="2"/>
  <circle cx="360" cy="378" r="14" fill="#BBF7D0" stroke="#FAFAFA" stroke-width="2"/>
  <circle cx="380" cy="378" r="14" fill="#DDD6FE" stroke="#FAFAFA" stroke-width="2"/>
  <circle cx="400" cy="378" r="14" fill="#FBCFE8" stroke="#FAFAFA" stroke-width="2"/>
  <text x="424" y="376" font-family="Arial" font-size="12" fill="#111111" font-weight="600">4,200+ writers</text>
  <text x="424" y="390" font-family="Arial" font-size="11" fill="#A3A3A3">already using Serif</text>

  <!-- Feature Cards -->
  <!-- Card 1 -->
  <rect x="48" y="424" width="224" height="156" rx="14" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#F0F0F0" stroke-width="0.5"/>
  <rect x="68" y="448" width="40" height="40" rx="10" fill="#F5F3FF"/>
  <text x="88" y="474" font-family="Arial" font-size="18" text-anchor="middle">&#9997;</text>
  <text x="68" y="510" font-family="Arial" font-size="14" font-weight="600" fill="#111111">Smart Editor</text>
  <text x="68" y="528" font-family="Arial" font-size="12" fill="#737373">AI-assisted writing with real-time</text>
  <text x="68" y="544" font-family="Arial" font-size="12" fill="#737373">suggestions and grammar fixes.</text>
  <text x="68" y="566" font-family="Arial" font-size="12" fill="#7C3AED" font-weight="500">Learn more →</text>

  <!-- Card 2 -->
  <rect x="288" y="424" width="224" height="156" rx="14" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#F0F0F0" stroke-width="0.5"/>
  <rect x="308" y="448" width="40" height="40" rx="10" fill="#ECFDF5"/>
  <text x="328" y="474" font-family="Arial" font-size="18" text-anchor="middle">&#128202;</text>
  <text x="308" y="510" font-family="Arial" font-size="14" font-weight="600" fill="#111111">Analytics</text>
  <text x="308" y="528" font-family="Arial" font-size="12" fill="#737373">Track engagement, readability,</text>
  <text x="308" y="544" font-family="Arial" font-size="12" fill="#737373">and SEO performance in one view.</text>
  <text x="308" y="566" font-family="Arial" font-size="12" fill="#059669" font-weight="500">Learn more →</text>

  <!-- Card 3 -->
  <rect x="528" y="424" width="224" height="156" rx="14" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#F0F0F0" stroke-width="0.5"/>
  <rect x="548" y="448" width="40" height="40" rx="10" fill="#FEF3C7"/>
  <text x="568" y="474" font-family="Arial" font-size="18" text-anchor="middle">&#9889;</text>
  <text x="548" y="510" font-family="Arial" font-size="14" font-weight="600" fill="#111111">Publish Anywhere</text>
  <text x="548" y="528" font-family="Arial" font-size="12" fill="#737373">One-click export to Medium,</text>
  <text x="548" y="544" font-family="Arial" font-size="12" fill="#737373">Substack, WordPress, and more.</text>
  <text x="548" y="566" font-family="Arial" font-size="12" fill="#D97706" font-weight="500">Learn more →</text>
</svg>