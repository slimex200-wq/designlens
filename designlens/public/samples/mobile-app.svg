<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="phoneBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="coolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="balanceGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#6366F1" flood-opacity="0.15"/>
    </filter>
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="275" y="20" width="250" height="560" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#F0F0F5"/>
  <circle cx="150" cy="300" r="300" fill="#E0E7FF" opacity="0.3"/>
  <circle cx="680" cy="250" r="250" fill="#FCE7F3" opacity="0.2"/>

  <!-- Phone Frame -->
  <rect x="275" y="20" width="250" height="560" rx="28" fill="#1A1A2E" filter="url(#phoneShadow)"/>
  <rect x="279" y="24" width="242" height="552" rx="26" fill="url(#phoneBg)" clip-path="url(#phoneClip)"/>

  <!-- Status Bar -->
  <text x="300" y="48" font-family="Arial" font-size="11" font-weight="600" fill="#1E293B">9:41</text>
  <rect x="464" y="38" width="20" height="10" rx="2" fill="#1E293B"/>
  <rect x="484" y="41" width="2" height="5" rx="1" fill="#1E293B" opacity="0.4"/>
  <rect x="446" y="39" width="14" height="8" rx="1" fill="none" stroke="#1E293B" stroke-width="1"/>
  <!-- Signal bars -->
  <rect x="422" y="44" width="3" height="4" rx="0.5" fill="#1E293B"/>
  <rect x="427" y="42" width="3" height="6" rx="0.5" fill="#1E293B"/>
  <rect x="432" y="40" width="3" height="8" rx="0.5" fill="#1E293B"/>
  <rect x="437" y="38" width="3" height="10" rx="0.5" fill="#1E293B"/>

  <!-- App Header -->
  <text x="300" y="80" font-family="Arial" font-size="22" font-weight="700" fill="#0F172A">Wallet</text>
  <circle cx="498" cy="74" r="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <circle cx="498" cy="71" r="5" fill="none" stroke="#475569" stroke-width="1.5"/>
  <line x1="498" y1="77" x2="498" y2="80" stroke="#475569" stroke-width="1.5"/>

  <!-- Balance Card -->
  <rect x="293" y="100" width="214" height="110" rx="16" fill="url(#primaryGrad)"/>
  <!-- Card shine -->
  <rect x="293" y="100" width="214" height="55" rx="16" fill="white" opacity="0.05"/>
  <text x="313" y="124" font-family="Arial" font-size="11" fill="white" opacity="0.7">Total Balance</text>
  <text x="313" y="156" font-family="Arial" font-size="28" font-weight="700" fill="white" letter-spacing="-1">$12,480</text>
  <text x="420" y="156" font-family="Arial" font-size="13" fill="white" opacity="0.6">.50</text>
  <rect x="313" y="172" width="64" height="22" rx="11" fill="white" opacity="0.15"/>
  <text x="325" y="187" font-family="Arial" font-size="10" fill="white" font-weight="500">+3.2% ↑</text>
  <!-- Card pattern -->
  <circle cx="490" cy="140" r="40" fill="white" opacity="0.04"/>
  <circle cx="505" cy="160" r="30" fill="white" opacity="0.04"/>

  <!-- Quick Actions -->
  <g>
    <!-- Send -->
    <rect x="293" y="224" width="48" height="48" rx="14" fill="#FFFFFF" filter="url(#innerShadow)"/>
    <circle cx="317" cy="242" r="8" fill="#EEF2FF"/>
    <text x="317" y="246" font-family="Arial" font-size="10" text-anchor="middle">↑</text>
    <text x="317" y="284" font-family="Arial" font-size="9" fill="#64748B" text-anchor="middle">Send</text>

    <!-- Receive -->
    <rect x="352" y="224" width="48" height="48" rx="14" fill="#FFFFFF" filter="url(#innerShadow)"/>
    <circle cx="376" cy="242" r="8" fill="#ECFDF5"/>
    <text x="376" y="246" font-family="Arial" font-size="10" text-anchor="middle">↓</text>
    <text x="376" y="284" font-family="Arial" font-size="9" fill="#64748B" text-anchor="middle">Receive</text>

    <!-- Swap -->
    <rect x="411" y="224" width="48" height="48" rx="14" fill="#FFFFFF" filter="url(#innerShadow)"/>
    <circle cx="435" cy="242" r="8" fill="#FEF3C7"/>
    <text x="435" y="246" font-family="Arial" font-size="10" text-anchor="middle">⇄</text>
    <text x="435" y="284" font-family="Arial" font-size="9" fill="#64748B" text-anchor="middle">Swap</text>

    <!-- More -->
    <rect x="470" y="224" width="37" height="48" rx="14" fill="#FFFFFF" filter="url(#innerShadow)"/>
    <text x="488" y="248" font-family="Arial" font-size="14" fill="#94A3B8" text-anchor="middle">···</text>
    <text x="488" y="284" font-family="Arial" font-size="9" fill="#64748B" text-anchor="middle">More</text>
  </g>

  <!-- Transactions Section -->
  <text x="293" y="316" font-family="Arial" font-size="14" font-weight="600" fill="#0F172A">Transactions</text>
  <text x="497" y="316" font-family="Arial" font-size="11" fill="#6366F1" text-anchor="end" font-weight="500">See All</text>

  <!-- Transaction 1 -->
  <rect x="293" y="328" width="214" height="56" rx="12" fill="#FFFFFF"/>
  <rect x="305" y="340" width="32" height="32" rx="10" fill="#FEF3C7"/>
  <text x="321" y="361" font-family="Arial" font-size="14" text-anchor="middle">☕</text>
  <text x="347" y="352" font-family="Arial" font-size="12" fill="#0F172A" font-weight="500">Starbucks</text>
  <text x="347" y="368" font-family="Arial" font-size="10" fill="#94A3B8">Today, 9:15 AM</text>
  <text x="497" y="356" font-family="Arial" font-size="13" fill="#EF4444" font-weight="600" text-anchor="end">-$5.40</text>

  <!-- Transaction 2 -->
  <rect x="293" y="392" width="214" height="56" rx="12" fill="#FFFFFF"/>
  <rect x="305" y="404" width="32" height="32" rx="10" fill="#ECFDF5"/>
  <text x="321" y="425" font-family="Arial" font-size="14" text-anchor="middle">💰</text>
  <text x="347" y="416" font-family="Arial" font-size="12" fill="#0F172A" font-weight="500">Salary Deposit</text>
  <text x="347" y="432" font-family="Arial" font-size="10" fill="#94A3B8">Yesterday</text>
  <text x="497" y="420" font-family="Arial" font-size="13" fill="#10B981" font-weight="600" text-anchor="end">+$4,200</text>

  <!-- Transaction 3 -->
  <rect x="293" y="456" width="214" height="56" rx="12" fill="#FFFFFF"/>
  <rect x="305" y="468" width="32" height="32" rx="10" fill="#EEF2FF"/>
  <text x="321" y="489" font-family="Arial" font-size="14" text-anchor="middle">🛒</text>
  <text x="347" y="480" font-family="Arial" font-size="12" fill="#0F172A" font-weight="500">Amazon</text>
  <text x="347" y="496" font-family="Arial" font-size="10" fill="#94A3B8">Mar 22</text>
  <text x="497" y="484" font-family="Arial" font-size="13" fill="#EF4444" font-weight="600" text-anchor="end">-$89.99</text>

  <!-- Bottom Nav -->
  <rect x="279" y="526" width="242" height="50" fill="#FFFFFF"/>
  <line x1="279" y1="526" x2="521" y2="526" stroke="#F1F5F9" stroke-width="0.5"/>

  <!-- Home (active) -->
  <rect x="299" y="530" width="40" height="3" rx="1.5" fill="url(#primaryGrad)"/>
  <circle cx="319" cy="546" r="3" fill="#6366F1"/>
  <text x="319" y="563" font-family="Arial" font-size="8" fill="#6366F1" text-anchor="middle" font-weight="600">Home</text>

  <!-- Cards -->
  <rect x="358" y="540" width="14" height="10" rx="2" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <text x="365" y="563" font-family="Arial" font-size="8" fill="#94A3B8" text-anchor="middle">Cards</text>

  <!-- Stats -->
  <polyline points="431,540 436,536 441,542 446,538" stroke="#94A3B8" stroke-width="1" fill="none"/>
  <text x="438" y="563" font-family="Arial" font-size="8" fill="#94A3B8" text-anchor="middle">Stats</text>

  <!-- Profile -->
  <circle cx="494" cy="541" r="6" fill="none" stroke="#94A3B8" stroke-width="1"/>
  <text x="494" y="563" font-family="Arial" font-size="8" fill="#94A3B8" text-anchor="middle">Profile</text>

  <!-- Home indicator -->
  <rect x="370" y="570" width="60" height="4" rx="2" fill="#CBD5E1"/>
</svg>